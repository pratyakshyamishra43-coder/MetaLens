<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaLens — {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body id="body">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">🔍</div>
            <div class="logo-text">
                <h1>MetaLens</h1>
                <span>AI Data Copilot</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-label">Workspace</div>
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <span class="nav-icon">⊞</span> Dashboard
            </a>
            <a href="/analysis" class="nav-item {% if request.path == '/analysis' %}active{% endif %}">
                <span class="nav-icon">⬡</span> Analysis
            </a>
            <a href="/quality" class="nav-item {% if request.path == '/quality' %}active{% endif %}">
                <span class="nav-icon">◎</span> Data Quality
            </a>
            <a href="/chat" class="nav-item {% if request.path == '/chat' %}active{% endif %}">
                <span class="nav-icon">✦</span> AI Chat
            </a>
            <a href="/lineage" class="nav-item {% if request.path == '/lineage' %}active{% endif %}">
                <span class="nav-icon">⟳</span> Lineage
            </a>
            <a href="/completeness" class="nav-item {% if request.path == '/completeness' %}active{% endif %}">
                    <span class="nav-icon">📋</span> Completeness
            </a>
            <a href="/smart_match" class="nav-item {% if request.path == '/smart_match' %}active{% endif %}">
                <span class="nav-icon">🔗</span> Smart Match
            </a>
        </div>

        <div class="sidebar-bottom">
            <div class="om-status">
                <div class="om-dot"></div>
                <div>
                    <div class="om-text">OpenMetadata</div>
                    <div class="om-sub">Connected · sandbox</div>
                </div>
            </div>
        </div>
    </div>
<!-- //Layout -->
    <div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <div class="search-box">
                <span style="color: #9ca3af; font-size: 14px;">🔍</span>
                <input type="text" id="globalSearch" placeholder="Search datasets, columns, lineage...">
                <span style="color: #d1d5db; font-size: 11px;">⌘K</span>
                <div id="search-results"></div>
            </div>
        </div>

        <div class="topbar-right">
            <div class="om-badge">
                <div class="om-badge-dot"></div>
                OpenMetadata Connected
            </div>
            <button class="icon-btn" title="Notifications">🔔</button>
            <div class="user-avatar">
                <div class="avatar-circle">K</div>
                <div>
                    <span class="user-name">Kaizen</span>
                    <span class="user-role">Data Steward</span>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</div>

<style>
    .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: nowrap; }
    .topbar-left { position: relative; }
    .search-box { position: relative; display: flex; align-items: center; gap: 8px; }
    #search-results {
        position: absolute;
        top: 44px;
        left: 0;
        width: 420px;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        z-index: 1000;
        display: none;
        max-height: 320px;
        overflow-y: auto;
    }
</style>

   <script>
    // Persist dark mode across pages
    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('body').classList.add('dark');
    }

    function toggleTheme() {
        const body = document.getElementById('body');
        body.classList.toggle('dark');
        localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
    }

    // Table search
    document.getElementById('globalSearch').addEventListener('input', async function() {
        const q = this.value;
        const div = document.getElementById('search-results');
        if (q.length < 2) { div.style.display = 'none'; return; }
        const res = await fetch(`/search_tables?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        if (!data.tables || data.tables.length === 0) { div.style.display = 'none'; return; }
        div.innerHTML = data.tables.map(t =>
            `<div onmouseenter="this.style.background='#f5f3ff'" onmouseleave="this.style.background='white'" onclick="selectTable('${t.fqn}')" style="padding:10px 14px; cursor:pointer; border-bottom:1px solid #f3f4f6; transition: background 0.15s;">
                <div style="font-size:13px; font-weight:600; color:#1a1a2e;">${t.name}</div>
                <div style="font-size:11px; color:#6b7280; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.fqn}</div>
            </div>`
        ).join('');
        div.style.display = 'block';
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-box')) {
            document.getElementById('search-results').style.display = 'none';
        }
    });

    function selectTable(fqn) {
        fetch('/select_table', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `fqn=${encodeURIComponent(fqn)}`
        }).then(() => window.location.href = '/');
    }
</script>

    {% block scripts %}{% endblock %}
</body>
</html>
